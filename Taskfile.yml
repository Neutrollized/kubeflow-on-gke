# https://taskfile.dev

version: '3'

vars:
  KUBEFLOW_MANIFESTS_RELEASE: 26.03
  KUBEFLOW_PROFILE: kubeflow-user-example-com

tasks:
  default:
    cmds:
      - task --list
    silent: true

  help:
    desc: show all available tasks
    cmds:
      - task --list


  #------------------------------------
  # miscellaneous / helpers
  #------------------------------------
  manifest:download+untar:
    desc: download & untar Kubeflow release manifest
    cmds:
      - wget https://github.com/kubeflow/manifests/archive/refs/tags/{{.KUBEFLOW_MANIFESTS_RELEASE}}.tar.gz -O manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}.tar.gz
      - tar -zxf manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}.tar.gz
    status:
      - test -f manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}.tar.gz
      - test -d manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}

  manifest:cleanup:
    desc: cleanup Kubeflow release manifest
    dir: ./
    cmds:
      - rm -Rf manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}
      - rm  manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}.tar.gz
    status:
      - test ! -d manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}
      - test ! -f manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}.tar.gz

  manifest:kustomize:fix:
    desc: run 'kustomize edit fix' (recursive)
    deps: [manifest:download+untar]
    dir: ./
    cmds:
      - find . -name "kustomization.yaml" -execdir kustomize edit fix \;


  #-----------------------------------------------------
  # from Kubeflow manifests GitHub - Common 
  #-----------------------------------------------------
  kf:namespaces:setup:
    desc: setup Kubeflow namespace & NetworkPolicy
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/common/
    cmds:
      - kustomize build kubeflow-namespace/base | kubectl apply -f -
    internal: true

  kf:namespaces:delete:
    desc: cleanup Kubeflow namespace & NetworkPolicy
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/common/
    cmds:
      - kustomize build kubeflow-namespace/base | kubectl delete -f -
    internal: true

  kf:cert-manager:setup:
    desc: setup Cert-Manager
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/common/
    cmds:
      - kustomize build cert-manager/overlays/kubeflow | kubectl apply -f -
      - kubectl wait --for=condition=Ready pod -l 'app.kubernetes.io/component=webhook,app.kubernetes.io/instance=cert-manager' --timeout=180s -n cert-manager
      - kubectl wait --for=condition=Ready pod -l 'app.kubernetes.io/component=controller,app.kubernetes.io/instance=cert-manager' --timeout=180s -n cert-manager
      - kubectl wait --for=condition=Ready pod -l 'app.kubernetes.io/component=cainjector,app.kubernetes.io/instance=cert-manager' --timeout=180s -n cert-manager
    status:
      - kubectl wait --for=jsonpath='{.endpoints[0].targetRef.kind}'=Pod endpointslice -l 'app in (cert-manager,webhook)' --timeout=180s -n cert-manager
    ignore_error: true
    internal: true

  kf:cert-manager:delete:
    desc: delete Cert-Manager
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/common/
    cmds:
      - kustomize build cert-manager/overlays/kubeflow | kubectl delete -f -
      # deleting orphaned webhooks
      - kubectl delete validatingwebhookconfigurations.admissionregistration.k8s.io cert-manager-webhook --ignore-not-found
      - kubectl delete mutatingwebhookconfigurations.admissionregistration.k8s.io cert-manager-webhook --ignore-not-found
    ignore_error: true
    status:
      - "! kubectl get ns cert-manager"
    internal: true

  kf:istio-cni:setup:
    desc: setup Istio-CNI with overlays for GKE
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/common/
    cmds:
      - kustomize build istio/istio-crds/base | kubectl apply -f -
      - kustomize build istio/istio-namespace/base | kubectl apply -f -
      - kustomize build istio/istio-install/overlays/gke | kubectl apply -f -
    internal: true

  kf:istio-cni:delete:
    desc: delete Istio-CNI with overlays for GKE
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/common/
    cmds:
      - kustomize build istio/istio-install/overlays/gke | kubectl delete -f -
      - kustomize build istio/istio-namespace/base | kubectl delete -f -
      - kustomize build istio/istio-crds/base | kubectl delete -f -
    internal: true

  kf:oauth2-proxy:setup:
    desc: setup oauth2-proxy 
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/common/
    cmds:
      - kustomize build oauth2-proxy/overlays/m2m-dex-only/ | kubectl apply -f -
      - kubectl wait --for=condition=Ready pod -l 'app.kubernetes.io/name=oauth2-proxy' --timeout=180s -n oauth2-proxy
    status:
      - kubectl wait --for=condition=Ready pod -l 'app.kubernetes.io/name=oauth2-proxy' --timeout=180s -n oauth2-proxy
    internal: true

  kf:oauth2-proxy:delete:
    desc: delete oauth2-proxy 
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/common/
    cmds:
      - kustomize build oauth2-proxy/overlays/m2m-dex-only/ | kubectl delete -f -
    status:
      - "! kubectl get ns oauth2-proxy"
    internal: true

  kf:istio-resources:setup:
    desc: setup Kubeflow gateway and ClusterRole
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/common/
    cmds:
      - kustomize build istio/kubeflow-istio-resources/base | kubectl apply -f -
    internal: true

  kf:istio-resources:delete:
    desc: setup Kubeflow gateway and ClusterRole
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/common/
    cmds:
      - kustomize build istio/kubeflow-istio-resources/base | kubectl delete -f -
    internal: true

  kf:profiles-controller:setup:
    desc: setup Profiles controller
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build profiles/pss | kubectl apply -f -
      - kubectl -n kubeflow rollout status deployment/profiles-deployment --timeout 180s
      - kubectl -n kubeflow wait --for=condition=Ready pods -l kustomize.component=profiles --timeout 180s
    status:
      - kubectl -n kubeflow wait --for=condition=Ready pods -l kustomize.component=profiles --timeout 180s
    internal: true

  kf:profiles-controller:delete:
    desc: setup Profiles controller
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build profiles/pss | kubectl delete -f -
    ignore_error: true
    internal: true

  kf:kubeflow-roles:setup:
    desc: setup Kubeflow roles (multi-tenancy)
    deps: [kf:profiles-controller:setup]
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/common/
    cmds:
      - kustomize build kubeflow-roles/base | kubectl apply -f -
    internal: true

  kf:kubeflow-roles:delete:
    desc: delete Kubeflow roles
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/common/
    cmds:
      - kustomize build kubeflow-roles/base | kubectl delete -f -
    ignore_error: true
    internal: true

  kf:dex:setup:
    desc: setup Dex (OIDC IdP)
    deps: [kf:oauth2-proxy:setup]
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/common/
    cmds:
      - kustomize build dex/overlays/oauth2-proxy | kubectl apply -f -
      - kubectl -n auth wait --for=condition=Ready pod -l app=dex --timeout=60s
    status:
      - kubectl -n auth wait --for=condition=Ready pod -l app=dex --timeout=60s
    internal: true

  kf:dex:delete:
    desc: delete Dex (OIDC IdP)
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/common/
    cmds:
      - kustomize build dex/overlays/oauth2-proxy | kubectl delete -f -
    status:
      - "! kubectl get ns auth"
    internal: true


  #-----------------------------------------------------
  # from Kubeflow manifests GitHub - Applications
  #-----------------------------------------------------
  kf:central-dashboard:setup:
    desc: setup Central Dashboard
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build centraldashboard/upstream/overlays/kserve | kubectl apply -f -
      - kubectl -n kubeflow wait --for=condition=Ready pod -l app.kubernetes.io/component=centraldashboard,app.kubernetes.io/name=centraldashboard,app=centraldashboard --timeout=60s
    status:
      - kubectl -n kubeflow wait --for=condition=Ready pod -l app.kubernetes.io/component=centraldashboard,app.kubernetes.io/name=centraldashboard,app=centraldashboard --timeout=60s
    internal: true

  kf:central-dashboard:delete:
    desc: delete Central Dashboard
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build centraldashboard/upstream/overlays/kserve | kubectl delete -f -
    internal: true

  kf:admission-webhook:setup:
    desc: setup Admission Webhook for PodDefaults
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build admission-webhook/upstream/overlays/cert-manager | kubectl apply -f -
    internal: true

  kf:admission-webhook:delete:
    desc: delete Admission Webhook for PodDefaults
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build admission-webhook/upstream/overlays/cert-manager | kubectl delete -f -
    internal: true

  kf:knative-eventing:setup:
    desc: setup Knative Eventing
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/common/
    cmds:
      - kustomize build knative/knative-eventing/base | kubectl apply -f -
    internal: true

  kf:knative-eventing:delete:
    desc: delete Knative Eventing
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/common/
    cmds:
      - kustomize build knative/knative-eventing/base | kubectl delete -f -
    internal: true

  kf:kserve:setup:
    desc: setup KServe
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build kserve/kserve | kubectl apply --server-side --force-conflicts -f -
      - kubectl wait --for=condition=Ready certificate/serving-cert -n kubeflow --timeout=60s
      - kubectl get secret kserve-webhook-server-cert -n kubeflow -o name
      - sleep 5
      - kubectl wait --for condition=established --timeout=30s crd/clusterservingruntimes.serving.kserve.io
      - kustomize build kserve/models-web-app/overlays/kubeflow | kubectl apply --server-side --force-conflicts -f -
      - kubectl wait --for=condition=Available deployment/kserve-controller-manager -n kubeflow --timeout=30s
      - kubectl wait --for=condition=Available deployment/kserve-models-web-app -n kubeflow --timeout=30s
      - kubectl get crd | grep -E 'inferenceservice|servingruntimes'
    ignore_error: true
    internal: true

  kf:kserve:delete:
    desc: delete KServe
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build kserve/models-web-app/overlays/kubeflow | kubectl delete -f -
      - sleep 5
      - kustomize build kserve/kserve | kubectl delete -f -
    ignore_error: true
    internal: true

  kf:pipelines:crds:setup:
    desc: setup Kubeflow Pipelines CRDs
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kubectl apply -f pipeline/upstream/third-party/metacontroller/base/crd.yaml
      - kubectl wait --for condition=established --timeout=30s crd/compositecontrollers.metacontroller.k8s.io
    internal: true

  kf:pipelines:crds:delete:
    desc: delete Kubeflow Pipelines CRDs
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kubectl delete -f pipeline/upstream/third-party/metacontroller/base/crd.yaml
    ignore_error: true
    internal: true

  # unused
  kf:pipelines:v1:setup:
    desc: setup Kubeflow Pipelines v1 (pipeline definitions stored in database)
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build pipeline/overlays | kubectl apply -f -
      - sleep 60
      - kubectl wait --for=condition=Available deployment/ml-pipeline -n kubeflow --timeout=30s 
      - kubectl wait --for=condition=Available deployment/ml-pipeline-ui -n kubeflow --timeout=30s 
      - kubectl wait --for=condition=Available deployment/ml-pipeline-persistenceagent -n kubeflow --timeout=30s
      - kubectl wait --for=condition=Available deployment/ml-pipeline-scheduledworkflow -n kubeflow --timeout=30s
      - kubectl wait --for=condition=Available deployment/ml-pipeline-viewer-crd -n kubeflow --timeout=30s 
      - kubectl wait --for=condition=Available deployment/cache-server -n kubeflow --timeout=30s 
      - kubectl wait --for=condition=Available deployment/metadata-writer -n kubeflow --timeout=30s 
      - kubectl wait --for=condition=Available deployment/seaweedfs -n kubeflow --timeout=30s
      - kubectl wait --for=condition=Available deployment/mysql -n kubeflow --timeout=30s
    status:
      - kubectl wait --for=condition=Available deployment/ml-pipeline -n kubeflow --timeout=30s 
      - kubectl wait --for=condition=Available deployment/ml-pipeline-ui -n kubeflow --timeout=30s 
      - kubectl wait --for=condition=Available deployment/ml-pipeline-persistenceagent -n kubeflow --timeout=30s
      - kubectl wait --for=condition=Available deployment/ml-pipeline-scheduledworkflow -n kubeflow --timeout=30s
      - kubectl wait --for=condition=Available deployment/ml-pipeline-viewer-crd -n kubeflow --timeout=30s 
      - kubectl wait --for=condition=Available deployment/cache-server -n kubeflow --timeout=30s 
      - kubectl wait --for=condition=Available deployment/metadata-writer -n kubeflow --timeout=30s 
      - kubectl wait --for=condition=Available deployment/seaweedfs -n kubeflow --timeout=30s
      - kubectl wait --for=condition=Available deployment/mysql -n kubeflow --timeout=30s
    internal: true

  # unused
  kf:pipelines:v1:delete:
    desc: delete Kubeflow Pipelines v1 (pipeline definitions stored in database)
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build pipeline/overlays | kubectl delete -f -
    ignore_error: true
    internal: true

  kf:pipelines:native:setup:
    desc: setup Kubeflow Pipelines v2 in K8s-native API mode (pipeline definitions as k8s resources)
    deps: [kf:pipelines:crds:setup]
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build pipeline/upstream/env/cert-manager/platform-agnostic-multi-user-k8s-native | kubectl apply -f -
      - kubectl wait --for=condition=Available deployment/ml-pipeline -n kubeflow --timeout=240s 
      - kubectl wait --for=condition=Available deployment/ml-pipeline-ui -n kubeflow --timeout=240s 
      - kubectl wait --for=condition=Available deployment/ml-pipeline-persistenceagent -n kubeflow --timeout=240s
      - kubectl wait --for=condition=Available deployment/ml-pipeline-scheduledworkflow -n kubeflow --timeout=240s
      - kubectl wait --for=condition=Available deployment/ml-pipeline-viewer-crd -n kubeflow --timeout=240s 
      - kubectl wait --for=condition=Available deployment/cache-server -n kubeflow --timeout=180s 
      - kubectl wait --for=condition=Available deployment/metadata-writer -n kubeflow --timeout=180s 
      - kubectl wait --for=condition=Available deployment/seaweedfs -n kubeflow --timeout=180s
      - kubectl wait --for=condition=Available deployment/mysql -n kubeflow --timeout=180s
    status:
      - kubectl wait --for=condition=Available deployment/ml-pipeline -n kubeflow --timeout=240s 
      - kubectl wait --for=condition=Available deployment/ml-pipeline-ui -n kubeflow --timeout=240s 
      - kubectl wait --for=condition=Available deployment/ml-pipeline-persistenceagent -n kubeflow --timeout=240s
      - kubectl wait --for=condition=Available deployment/ml-pipeline-scheduledworkflow -n kubeflow --timeout=240s
      - kubectl wait --for=condition=Available deployment/ml-pipeline-viewer-crd -n kubeflow --timeout=240s 
      - kubectl wait --for=condition=Available deployment/cache-server -n kubeflow --timeout=180s 
      - kubectl wait --for=condition=Available deployment/metadata-writer -n kubeflow --timeout=180s 
      - kubectl wait --for=condition=Available deployment/seaweedfs -n kubeflow --timeout=180s
      - kubectl wait --for=condition=Available deployment/mysql -n kubeflow --timeout=180s
    internal: true

  kf:pipelines:native:delete:
    desc: delete Kubeflow Pipelines v2 in K8s-native API mode
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build pipeline/upstream/env/cert-manager/platform-agnostic-multi-user-k8s-native | kubectl delete -f -
    ignore_error: true
    internal: true

  kf:katib:setup:
    desc: setup Katib
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build katib/upstream/installs/katib-with-kubeflow | kubectl apply -f -
      - kubectl wait --for=condition=Available deployment/katib-controller -n kubeflow --timeout=300s
      - kubectl wait --for=condition=Available deployment/katib-mysql -n kubeflow --timeout=300s
    status:
      - kubectl wait --for=condition=Available deployment/katib-controller -n kubeflow --timeout=300s
      - kubectl wait --for=condition=Available deployment/katib-mysql -n kubeflow --timeout=300s
    internal: true

  kf:katib:delete:
    desc: delete Katib
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build katib/upstream/installs/katib-with-kubeflow | kubectl delete -f -
    internal: true

  kf:notebooks:v1:setup:
    desc: setup Notebooks 1.0
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build jupyter/notebook-controller/upstream/overlays/kubeflow | kubectl apply -f -
      - kustomize build jupyter/jupyter-web-app/upstream/overlays/istio | kubectl apply -f -
    internal: true

  kf:notebooks:v1:delete:
    desc: delete Notebooks 1.0
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build jupyter/jupyter-web-app/upstream/overlays/istio | kubectl delete -f -
      - kustomize build jupyter/notebook-controller/upstream/overlays/kubeflow | kubectl delete -f -
    internal: true

  kf:pvcviewer-controller:setup:
    desc: setup PVC Viewer Controller
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build pvcviewer-controller/upstream/base | kubectl apply -f -
    internal: true

  kf:pvcviewer-controller:delete:
    desc: delete PVC Viewer Controller
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build pvcviewer-controller/upstream/base | kubectl delete -f -
    internal: true

  kf:volumes-web-app:setup:
    desc: setup Volumes Web Application
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build volumes-web-app/upstream/overlays/istio | kubectl apply -f -
      - kubectl wait --for=condition=Available deployment/volumes-web-app-deployment -n kubeflow --timeout=180s
    status:
      - kubectl wait --for=condition=Available deployment/volumes-web-app-deployment -n kubeflow --timeout=180s
    internal: true

  kf:volumes-web-app:delete:
    desc: delete Volumes Web Application
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build volumes-web-app/upstream/overlays/istio | kubectl delete -f -
    internal: true

  kf:tensorboard:setup:
    desc: setup Tensorboard
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build tensorboard/tensorboards-web-app/upstream/overlays/istio | kubectl apply -f -
      - kustomize build tensorboard/tensorboard-controller/upstream/overlays/kubeflow | kubectl apply -f -
    internal: true

  kf:tensorboard:delete:
    desc: delete Tensorboard
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build tensorboard/tensorboard-controller/upstream/overlays/kubeflow | kubectl delete -f -
      - kustomize build tensorboard/tensorboards-web-app/upstream/overlays/istio | kubectl delete -f -
    internal: true

  kf:trainer:v2:setup:
    desc: setup Trainer
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build trainer/upstream/base/crds | kubectl apply --server-side --force-conflicts -f -
      - kubectl wait --for condition=established crd/trainjobs.trainer.kubeflow.org --timeout=60s
      - sleep 5
      - kustomize build trainer/overlays | kubectl apply --server-side --force-conflicts -f -
      - kubectl wait --for=condition=Available deployment/kubeflow-trainer-controller-manager -n kubeflow-system --timeout=240s
      - kubectl get crd jobsets.jobset.x-k8s.io
      - kubectl wait --for=condition=Available deployment/jobset-controller-manager -n kubeflow-system --timeout=120s
      - sleep 5
      - kustomize build trainer/upstream/overlays/runtimes | kubectl apply --server-side --force-conflicts -f -
      - kubectl apply -f trainer/upstream/overlays/kubeflow-platform/kubeflow-trainer-roles.yaml
      - sleep 5
      - kubectl get deployment -n kubeflow-system kubeflow-trainer-controller-manager
      - kubectl get pods -n kubeflow-system -l app.kubernetes.io/name=trainer
      - kubectl get crd | grep -E 'trainer.kubeflow.org'
      - kubectl get clustertrainingruntimes
      - sleep 5
      - kubectl rollout restart deployment/jobset-controller-manager -n kubeflow-system
      - kubectl rollout status deployment/jobset-controller-manager -n kubeflow-system --timeout=120s
      - kubectl wait --for=condition=Available deployment/jobset-controller-manager -n kubeflow-system --timeout=120s
    internal: true

  kf:trainer:v2:delete:
    desc: delete Trainer
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kubectl delete -f trainer/upstream/overlays/kubeflow-platform/kubeflow-trainer-roles.yaml
      - kustomize build trainer/upstream/overlays/runtimes | kubectl delete -f -
      - kustomize build trainer/overlays | kubectl delete -f -
      - kustomize build trainer/upstream/base/crds | kubectl delete -f -
    ignore_error: true
    internal: true

  kf:spark-operator:setup:
    desc: setup Spark Operator
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build spark/spark-operator/overlays/kubeflow | kubectl -n kubeflow apply --server-side --force-conflicts -f -
      - kubectl -n kubeflow wait --for=condition=available --timeout=180s deploy/spark-operator-controller
      - kubectl -n kubeflow wait --for=condition=available --timeout=180s deploy/spark-operator-webhook
      - kubectl -n kubeflow wait --for=condition=Ready pod -l app.kubernetes.io/name=spark-operator,app.kubernetes.io/component=webhook --timeout=180s
      - "kubectl -n kubeflow wait --for=jsonpath='{.endpoints[0].targetRef.kind}'=Pod $(kubectl get endpointslice -n kubeflow -l kubernetes.io/service-name=spark-operator-webhook-svc -o name) --timeout=180s"
    status:
      - kubectl -n kubeflow wait --for=condition=Ready pod -l app.kubernetes.io/name=spark-operator,app.kubernetes.io/component=webhook --timeout=180s
      - "kubectl -n kubeflow wait --for=jsonpath='{.endpoints[0].targetRef.kind}'=Pod $(kubectl get endpointslice -n kubeflow -l kubernetes.io/service-name=spark-operator-webhook-svc -o name) --timeout=180s"
    internal: true

  kf:spark-operator:delete:
    desc: delete Spark Operator
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/applications/
    cmds:
      - kustomize build spark/spark-operator/overlays/kubeflow | kubectl -n kubeflow delete -f -
    internal: true

  kf:user-namespaces:setup:
    desc: setup namespace for default user
    deps: [kf:profiles-controller:setup]
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/common/
    cmds:
      - kustomize build user-namespace/base | kubectl apply -f -
      - sleep 30
      - kubectl -n {{.KUBEFLOW_PROFILE}} get pods,configmaps,secrets
      - kubectl label namespace {{.KUBEFLOW_PROFILE}} pod-security.kubernetes.io/enforce=baseline --overwrite
    status:
      - kubectl get profile kubeflow-user-example-com
    internal: true

  kf:user-namespaces:delete:
    desc: delete namespace for default user
    dir: ./manifests-{{.KUBEFLOW_MANIFESTS_RELEASE}}/common/
    cmds:
      - kustomize build user-namespace/base | kubectl delete -f -
    internal: true


  #-----------------------------------------------------
  # Main
  #-----------------------------------------------------
  kf:common:setup:
    desc: setup Kubeflow common apps (Prerequisites)
    deps: [manifest:download+untar]
    cmds:
      - task: kf:namespaces:setup
      - task: kf:cert-manager:setup
      - task: kf:istio-cni:setup
      - task: kf:oauth2-proxy:setup
      - task: kf:istio-resources:setup
      - task: kf:profiles-controller:setup
      - task: kf:kubeflow-roles:setup
      - task: kf:dex:setup
    internal: true

  kf:common:delete:
    desc: delete Kubeflow common apps
    cmds:
      - task: kf:dex:delete
      - task: kf:kubeflow-roles:delete
      - task: kf:profiles-controller:delete
      - task: kf:istio-resources:delete
      - task: kf:oauth2-proxy:delete
      - task: kf:istio-cni:delete
      - task: kf:cert-manager:delete
      - task: kf:namespaces:delete
    internal: true

  kf:applications:minimal:setup:
    desc: setup Kubeflow applications (Minimal)
    cmds:
      - task: kf:central-dashboard:setup
      - task: kf:admission-webhook:setup
      - task: kf:knative-eventing:setup
      - task: kf:kserve:setup
      - task: kf:pipelines:crds:setup
      - task: kf:pipelines:native:setup
      - task: kf:notebooks:v1:setup
      - task: kf:pvcviewer-controller:setup
      - task: kf:volumes-web-app:setup
    internal: true

  kf:applications:minimal:delete:
    desc: delete Kubeflow applications
    cmds:
      - task: kf:volumes-web-app:delete
      - task: kf:pvcviewer-controller:delete
      - task: kf:notebooks:v1:delete
      - task: kf:pipelines:native:delete
      - task: kf:pipelines:crds:delete
      - task: kf:kserve:delete
      - task: kf:knative-eventing:delete
      - task: kf:admission-webhook:delete
      - task: kf:central-dashboard:delete
    internal: true

  kf:applications:full:setup:
    desc: setup Kubeflow applications (Full)
    cmds:
      - task: kf:central-dashboard:setup
      - task: kf:admission-webhook:setup
      - task: kf:knative-eventing:setup
      - task: kf:kserve:setup
      - task: kf:pipelines:crds:setup
      - task: kf:pipelines:native:setup
      - task: kf:katib:setup
      - task: kf:notebooks:v1:setup
      - task: kf:pvcviewer-controller:setup
      - task: kf:volumes-web-app:setup
      - task: kf:tensorboard:setup
      - task: kf:trainer:v2:setup
      - task: kf:spark-operator:setup
    internal: true

  kf:applications:full:delete:
    desc: delete Kubeflow applications
    cmds:
      - task: kf:spark-operator:delete
      - task: kf:trainer:v2:delete
      - task: kf:tensorboard:delete
      - task: kf:volumes-web-app:delete
      - task: kf:pvcviewer-controller:delete
      - task: kf:notebooks:v1:delete
      - task: kf:katib:delete
      - task: kf:pipelines:native:delete
      - task: kf:pipelines:crds:delete
      - task: kf:kserve:delete
      - task: kf:knative-eventing:delete
      - task: kf:admission-webhook:delete
      - task: kf:central-dashboard:delete
    internal: true

  all:min:
    desc: Kubeflow install (Minimal)
    cmds:
      - task: kf:common:setup
      - sleep 5
      - task: kf:applications:minimal:setup
      - task: kf:user-namespaces:setup
      - |
        echo "run: \"task kf:port-forward:ui\" to get access to dashboard"

  clean:min:
    desc: cleanup minimal Kubeflow install
    cmds:
      - task: kf:user-namespaces:delete
      - task: kf:applications:minimal:delete
      - sleep 5
      - task: kf:common:delete

  all:
    desc: Kubeflow install (Full)
    cmds:
      - task: kf:common:setup
      - sleep 5
      - task: kf:applications:full:setup
      - task: kf:user-namespaces:setup
      - |
        echo "run: \"task kf:port-forward:ui\" to get access to dashboard"

  clean:
    desc: cleanup full Kubeflow install
    cmds:
      - task: kf:user-namespaces:delete
      - task: kf:applications:full:delete
      - sleep 5
      - task: kf:common:delete

  kf:port-forward:ui:
    desc: port-forward Kubeflow web UI
    cmds:
      - kubectl port-forward svc/istio-ingressgateway -n istio-system 8080:80

  kf:port-forward:ml-pipeline:
    desc: port-forward ML Pipeline service (for SDK to connect to programmatically)
    cmds:
      - kubectl port-forward svc/ml-pipeline -n kubeflow 8888:8888
